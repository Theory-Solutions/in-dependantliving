<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect with In-dependent Living</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      color: #1e3a5f;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2d5a87 0%, #1e3a5f 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45,90,135,0.4);
    }
    .error {
      background: #fee;
      color: #c00;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
    .footer a { color: #2d5a87; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💙</div>
    <h1>Connect to In-dependent Living</h1>
    <p id="status">Opening In-dependent Living app...</p>
    <a href="#" id="openBtn" class="btn">Open App</a>
    <div class="footer">
      <p>By connecting, you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    const iosScheme = 'independentliving://';
    const androidScheme = 'independentliving://';
    const webFallback = 'https://apps.apple.com/app/id6761432570';

    function openApp() {
      // Try iOS scheme
      window.location.href = iosScheme + 'connect/' + code;
      
      // Fallback: setTimeout to show download option
      setTimeout(() => {
        document.getElementById('status').textContent = 'App not installed?';
        document.getElementById('openBtn').textContent = 'Get the App';
        document.getElementById('openBtn').href = webFallback;
      }, 1500);
    }

    if (code) {
      document.getElementById('openBtn').href = iosScheme + 'connect/' + code;
      openApp();
    } else {
      document.getElementById('status').innerHTML = '<div class="error">Invalid connection code. Please ask your family member for a new link.</div>';
      document.getElementById('openBtn').style.display = 'none';
    }
  </script>
</body>
</html>
